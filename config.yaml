# =========================================================
# Binance Auto-Trading Bot — config
# Edit values here. Keys live in .env (never commit them).
# =========================================================

risk:
  stop_loss_pct: 0.05         # 5% — reachable with 10x leverage (liquidation ~10%)
  take_profit_pct: 0.10       # 10% — R:R = 1:2 (ได้เปรียบ)
  order_size_usdt: 100        # notional per trade (testnet)
  max_open_positions: 2       # per bot
  daily_loss_limit_pct: 0.05  # 5% of starting balance — kill-switch

symbols:
  - BTCUSDT
  - ETHUSDT

# Candle interval used for indicator calculation.
# Options: 1m, 3m, 5m, 15m, 1h, 4h, 1d
interval: "15m"

# Loop tick in seconds — ควรตรงกับ interval (15m = 900s)
loop_seconds: 900

# Verbose logging — true = แสดง indicator ทุก tick, false = แสดงเฉพาะ trade/error
verbose: true

# ---------------------------------------------------------
# SPOT bot
# ---------------------------------------------------------
spot:
  enabled: false
  # Strategy options:
  #   supertrend | rsi | bb | ema   → single indicator
  #   combined                      → RSI + EMA (legacy)
  #   majority                      → 2/3: Supertrend + RSI + BB  ← recommended
  #   confluence                    → 3/3: Supertrend + RSI + BB  ← strictest
  #   grid                          → grid mode (independent of signals)
  strategy: "majority"

  supertrend:
    period: 10        # ATR period — มาตรฐานสากล
    multiplier: 3.0   # ยิ่งสูง = band กว้าง = สัญญาณช้า noise น้อย

  rsi:
    period: 14
    oversold: 30      # buy when RSI crosses up through 30
    overbought: 70    # sell when RSI crosses down through 70

  bb:
    period: 20        # John Bollinger's original
    std_dev: 2.0      # ±2σ ครอบคลุม ~95% ของราคา

  ema:                # ใช้ standalone mode เท่านั้น (strategy: "ema")
    fast: 9
    slow: 21

  grid:
    levels: 5
    step_pct: 0.005
    quote_per_level: 50

# ---------------------------------------------------------
# FUTURES bot (USDT-M perpetuals)
# ---------------------------------------------------------
futures:
  enabled: true
  # Strategy options: supertrend | rsi | bb | ema | combined | majority | confluence
  strategy: "majority"
  leverage: 10
  margin_type: "ISOLATED"

  supertrend:
    period: 10
    multiplier: 3.0

  rsi:
    period: 12
    oversold: 40
    overbought: 60

  bb:
    period: 20
    std_dev: 2.0

  ema:                # ใช้ standalone mode เท่านั้น
    fast: 9
    slow: 21
